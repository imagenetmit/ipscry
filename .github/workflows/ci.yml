name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1

      - name: Build (windows/amd64)
        env:
          GOOS: windows
          GOARCH: amd64
        run: go build -trimpath -ldflags "-X main.appVersion=ci-${{ github.sha }}" -o dist/ipscry.exe .
